name: Dump firmware(s)

on:
  workflow_dispatch:
    inputs:
      urls:
        description: 'URLs'
        required: true

jobs:
  dump:
    runs-on: ubuntu-latest

    steps:
    - name: Run maximize-github-runner-space
      uses: justinthelaw/maximize-github-runner-space@v0.9.0

    - name: Checkout repo
      uses: actions/checkout@v4

    - name: Setup
      run: |
        sudo apt update
        sudo apt -y install aria2 zstd

    - name: Dump
      id: dump
      run: echo "${{ inputs.urls }}" | xargs ./dump.sh

    - name: Upload release assets
      uses: ncipollo/release-action@v1.20.0
      with:
        artifacts: ota/*.img.*
        artifactErrorsFailBuild: true
        body: ${{ steps.dump.outputs.body }}
        tag: ${{ steps.dump.outputs.tag }}
        token: ${{ secrets.GITHUB_TOKEN }}
